<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday, Sonechiii!</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fce4ec; /* Light pink background */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden; /* Prevent scrollbars during animations */
        }

        .card-container {
            perspective: 1500px; /* Essential for 3D flip effect */
            cursor: pointer;
        }

        .card {
            width: 350px;
            height: 500px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1s ease-in-out;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .card.open {
            transform: rotateY(-160deg); /* Adjust for how far the cover opens */
        }

        .card-front, .card-back {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            backface-visibility: hidden; /* Hide the back when the front is visible */
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            box-sizing: border-box;
            text-align: center;
        }

        /* Front Cover Styles */
        .card-front {
            background-color: #e91e63; /* Pink cover color */
            color: white;
            transform: rotateY(0deg); /* Initial position */
            z-index: 2; /* Put the cover in front */
        }

        .card-front h1 {
            font-size: 3em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .card-front p {
            font-size: 1.2em;
        }

        /* Inside (Back) of Cover Styles */
        .card-back {
            background-color: #fff1f6; /* Inside color */
            color: #333;
            transform: rotateY(180deg); /* Start rotated, then flip reveals it */
            border: 5px solid #e91e63;
        }

        .card-back h2 {
            color: #e91e63;
            font-size: 2.5em;
            margin-top: 0;
        }

        .card-back p {
            font-size: 1.1em;
            line-height: 1.6;
        }

        /* Ballon Styles */
        .balloon {
            position: fixed;
            bottom: -100px; /* Start off-screen at the bottom */
            width: 50px;
            height: 70px;
            border-radius: 50%;
            opacity: 0.8;
            pointer-events: none; /* Make balloons unclickable */
            z-index: 1; /* Below the card, above the background */
            animation: floatUp infinite ease-in-out;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0.8; }
            100% { transform: translateY(-120vh) rotate(var(--rotation)); opacity: 0; }
        }

        /* Popper Styles */
        .popper {
            position: fixed;
            bottom: 20px;
            font-size: 3em;
            opacity: 0;
            pointer-events: none;
            z-index: 10; /* Above everything */
        }

        .popper-left { left: 20px; animation: popLeft 0.5s ease-out forwards; }
        .popper-right { right: 20px; animation: popRight 0.5s ease-out forwards; }

        @keyframes popLeft {
            0% { transform: scale(0) rotate(-45deg); opacity: 0; }
            50% { transform: scale(1.2) rotate(0deg); opacity: 1; }
            100% { transform: scale(1) rotate(0deg); opacity: 0; } /* Fade out */
        }

        @keyframes popRight {
            0% { transform: scale(0) rotate(45deg); opacity: 0; }
            50% { transform: scale(1.2) rotate(0deg); opacity: 1; }
            100% { transform: scale(1) rotate(0deg); opacity: 0; } /* Fade out */
        }
    </style>
</head>
<body>

    <div class="card-container" onclick="openCard()">
        <div class="card" id="birthdayCard">
            <!-- Front of the Card -->
            <div class="card-front">
                <h1>Happy Birthday...</h1>
                <p>Click to open!</p>
            </div>
            <!-- Inside of the Card -->
            <div class="card-back">
                <h2>Happy Birthday, Sonechiii!</h2>
                <p>Wishing you the happiest of birthdays today!</p>
                <p>May your day be filled with love, laughter, joy, and everything you wish for.</p>
                <p>You deserve all the happiness in the world. Enjoy your special day to the fullest!</p>
            </div>
        </div>
    </div>

    <!-- Container for balloons -->
    <div id="balloon-container"></div>

    <script>
        // Array of possible balloon colors
        const balloonColors = ['#ff1744', '#f50057', '#d500f9', '#651fff', '#3d5afe', '#2979ff', '#00b0ff', '#00e5ff', '#1de9b6', '#00e676', '#76ff03', '#c6ff00', '#ffea00', '#ffc400', '#ff9100', '#ff3d00'];

        function openCard() {
            const card = document.getElementById('birthdayCard');
            // If card is already open, do nothing (prevent re-popping)
            if (card.classList.contains('open')) return; 

            card.classList.add('open');

            // Trigger animations
            createBalloons();
            triggerPoppers();
        }

        function createBalloons() {
            const container = document.getElementById('balloon-container');
            const numBalloons = 30; // Number of balloons to create

            for (let i = 0; i < numBalloons; i++) {
                const balloon = document.createElement('div');
                balloon.classList.add('balloon');

                // Random color
                balloon.style.backgroundColor = balloonColors[Math.floor(Math.random() * balloonColors.length)];

                // Random horizontal starting position
                balloon.style.left = `${Math.random() * 100}vw`;

                // Random animation duration and delay
                const duration = 5 + Math.random() * 5; // 5 to 10 seconds
                const delay = Math.random() * 3; // 0 to 3 seconds
                balloon.style.animationDuration = `${duration}s`;
                balloon.style.animationDelay = `${delay}s`;

                // Set a CSS variable for random rotation in animation
                const rotation = -30 + Math.random() * 60; // -30 to +30 degrees
                balloon.style.setProperty('--rotation', `${rotation}deg`);

                container.appendChild(balloon);

                // Remove balloon element after animation finishes
                setTimeout(() => {
                    balloon.remove();
                }, (duration + delay) * 1000); 
            }
        }

        function triggerPoppers() {
            // Create popper elements (simple emojis)
            const leftPopper = document.createElement('div');
            leftPopper.classList.add('popper', 'popper-left');
            leftPopper.innerText = '🎉';
            document.body.appendChild(leftPopper);

            const rightPopper = document.createElement('div');
            rightPopper.classList.add('popper', 'popper-right');
            rightPopper.innerText = '🥳';
            document.body.appendChild(rightPopper);

            // Remove poppers after animation finishes (0.5s)
            setTimeout(() => {
                leftPopper.remove();
                rightPopper.remove();
            }, 1000); // 1 second to give a little time after fading out
        }
    </script>
</body>
</html>
